# Codemagic CI/CD — يبني APK تلقائياً عند كل push
# https://docs.codemagic.io/yaml-quick-start/building-an-android-app/

workflows:
  capacitor-android:
    name: GasTech POS — Capacitor Android
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.gastech.pos"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install -g @ionic/cli @capacitor/cli
          bun install
      - name: Build web assets
        script: bun run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
